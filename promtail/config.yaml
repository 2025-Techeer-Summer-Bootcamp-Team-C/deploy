server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ────────────── 1. Traefik Access Logs ──────────────
  - job_name: traefik_accesslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          __path__: /logs/access.log
    pipeline_stages:
      - json:  # JSON 로그 파싱
          expressions:
            ClientAddr: ClientAddr
            RequestMethod: RequestMethod
            RequestPath: RequestPath
            DownstreamStatus: DownstreamStatus
            Duration: Duration
            ServiceName: ServiceName
      - labels: # 라벨 추가 (Grafana에서 필터링 가능)
          RequestMethod:
          RequestPath:
          DownstreamStatus:
          ServiceName:

  # ────────────── 2. Docker Container Logs ──────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: 'Backend'
        target_label: 'job'
        replacement: 'backend'
      - source_labels: ['__meta_docker_container_name']
        regex: 'Board-Traefik'
        target_label: 'job'
        replacement: 'traefik'
      - source_labels: ['__meta_docker_container_name']
        regex: 'mysql'
        target_label: 'job'
        replacement: 'mysql'
      - source_labels: ['__meta_docker_container_name']
        regex: 'rabbitmq'
        target_label: 'job'
        replacement: 'rabbitmq'
      - source_labels: ['__meta_docker_container_name']
        regex: 'celery_io'
        target_label: 'job'
        replacement: 'celery-io'
      - source_labels: ['__meta_docker_container_name']
        regex: 'celery_cpu'
        target_label: 'job'
        replacement: 'celery-cpu'
      - source_labels: ['__meta_docker_container_name']
        regex: 'celery_beat'
        target_label: 'job'
        replacement: 'celery-beat'
      - source_labels: ['__meta_docker_container_name']
        regex: 'grafana'
        target_label: 'job'
        replacement: 'grafana'
      - source_labels: ['__meta_docker_container_name']
        regex: 'loki'
        target_label: 'job'
        replacement: 'loki'
      - source_labels: ['__meta_docker_container_name']
        regex: 'prometheus'
        target_label: 'job'
        replacement: 'prometheus'
      - source_labels: ['__meta_docker_container_name']
        regex: 'cadvisor'
        target_label: 'job'
        replacement: 'cadvisor'
