name: Deploy Compose

on:
  repository_dispatch:
    types: [deploy-backend]
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Show workspace tree
        run: ls -R
        shell: bash

      - name: Deploy the app # 배포중 메시지 출력
        run: echo "Deploying the app..."

      # --- mysql-exporter 디렉터리 권한 준비 추가 ---
      - name: Prepare mysql-exporter perms
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 디렉터리가 없으면 생성
            sudo mkdir -p /home/ubuntu/mysql-exporter
            # 소유권을 ubuntu:ubuntu 로 변경
            sudo chown -R ubuntu:ubuntu /home/ubuntu/mysql-exporter
            # 읽기/쓰기/실행 권한 모두에게 허용
            sudo chmod -R ugo+rwX /home/ubuntu/mysql-exporter

      - name: Copy file to Server # docker-compose.yml파일을 서버로 복사
        id: copy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PASSWORD }}
          source: "./docker-compose.yml,./docker-compose.monitoring.yml,./docker-compose.logging.yml,./prometheus/**,./mysql-exporter/**"
          target: /home/ubuntu/
          debug: true
      
      - name: Deploy to Server # 복사된 docker-compose.yml 파일을 실행
        id: deploy
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PASSWORD }}
          script: |
            # ---- acme.json 권한 보장 ----
            sudo mkdir -p /home/ubuntu/letsencrypt
            sudo touch /home/ubuntu/letsencrypt/acme.json
            sudo chmod 600 /home/ubuntu/letsencrypt/acme.json
            
            # ---- Grafana 볼륨 권한 ----
            sudo mkdir -p /home/ubuntu/grafana/data
            sudo chown -R 472:472 /home/ubuntu/grafana
            # ----------------------------

            # 디렉터리 없으면 생성
            sudo mkdir -p /home/ubuntu/mysql-exporter
            # 기존 파일 보존하면서 소유권만 ubuntu:ubuntu 으로 변경
            sudo chown -R ubuntu:ubuntu /home/ubuntu/mysql-exporter
            
            export DJANGO_SETTINGS_MODULE=config.settings.dev
            export ENVIRONMENT=prod
            export MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            export MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            export DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            export DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            export DATABASE_USER=${{ secrets.DATABASE_USER }}
            export DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            export BITSTUDIO_API_KEY=${{ secrets.BITSTUDIO_API_KEY }}
            export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_STORAGE_BUCKET_NAME=${{ secrets.AWS_STORAGE_BUCKET_NAME }}
            export AWS_S3_REGION_NAME=${{ secrets.AWS_S3_REGION_NAME }}
            export AWS_S3_CUSTOM_DOMAIN=${{ secrets.AWS_S3_CUSTOM_DOMAIN }}

            export TNB_EMAIL=${{ secrets.TNB_EMAIL }}
            export TNB_PASSWORD=${{ secrets.TNB_PASSWORD }}

            export SWAGGER_BASE_URL=${{ secrets.SWAGGER_BASE_URL }}

            docker compose \
            -f docker-compose.yml \
            -f docker-compose.monitoring.yml \
            -f docker-compose.logging.yml \
            down

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.monitoring.yml \
              -f docker-compose.logging.yml \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.monitoring.yml \
              -f docker-compose.logging.yml \
              up -d --remove-orphans
            
            docker logs grafana --tail 50
      
      - name: Clean Up Files in Server # 이후 docker-compose.yml 파일 삭제 
        if: always()
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PASSWORD }}
          script: |
            rm -f /home/ubuntu/docker-compose.yml
